---
- name: Fail if grafana_admin_password is unset or insecure
  ansible.builtin.fail:
    msg: >-
      grafana_admin_password is {{ 'not set' if grafana_admin_password is not defined
      else 'set to the insecure default "admin"' }}.
      Set a strong password via host_vars, ansible-vault, or --extra-vars
      (e.g. -e grafana_admin_password=YOUR_SECRET).
  when: >-
    grafana_admin_password is not defined
    or grafana_admin_password | length < 8
    or grafana_admin_password == 'admin'

- name: Start observability stack
  ansible.builtin.command:
    cmd: >
      docker compose -f {{ compose_file }} --profile observability up -d
      prometheus alertmanager loki promtail grafana
  register: observe_compose_up
  environment:
    GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
  changed_when: >-
    'Created' in (observe_compose_up.stdout ~ observe_compose_up.stderr)
    or 'Recreated' in (observe_compose_up.stdout ~ observe_compose_up.stderr)
    or 'Started' in (observe_compose_up.stdout ~ observe_compose_up.stderr)

- name: Wait for Prometheus to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ prometheus_port }}/-/ready"
    method: GET
    status_code: 200
  register: prom_health
  until: prom_health.status == 200
  retries: 12
  delay: 5

- name: Wait for Alertmanager to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ alertmanager_port }}/-/ready"
    method: GET
    status_code: 200
  register: am_health
  until: am_health.status == 200
  retries: 12
  delay: 5

- name: Wait for Loki to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ loki_port }}/ready"
    method: GET
    status_code: 200
  register: loki_health
  until: loki_health.status == 200
  retries: 12
  delay: 5

- name: Wait for Grafana to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ grafana_port }}/api/health"
    method: GET
    status_code: 200
  register: grafana_health
  until: grafana_health.status == 200
  retries: 12
  delay: 5

- name: Print observability endpoints
  ansible.builtin.debug:
    msg: |
      Observability stack is ready on the remote host loopback interface.
      Use SSH tunnels unless you intentionally change the compose bind host
      and restrict access with trusted_ips.

        Prometheus:   http://localhost:{{ prometheus_port }}
        Alertmanager: http://localhost:{{ alertmanager_port }}
        Loki:         http://localhost:{{ loki_port }}
        Grafana:      http://localhost:{{ grafana_port }} (user: admin)
      Dashboards:
        Overview:          http://localhost:{{ grafana_port }}/d/kora-overview
        Performance:       http://localhost:{{ grafana_port }}/d/kora-performance
        Stall Diagnostics: http://localhost:{{ grafana_port }}/d/kora-stall-diagnostics
        Logs Explorer:     http://localhost:{{ grafana_port }}/d/kora-logs
