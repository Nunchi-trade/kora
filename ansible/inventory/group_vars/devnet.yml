# Remote paths
remote_project_dir: /opt/kora
compose_file: "{{ remote_project_dir }}/docker/compose/devnet.yaml"
bake_file: "{{ remote_project_dir }}/docker/docker-bake.hcl"

# Docker
docker_image: "kora:local"
compose_project_name: kora-devnet
docker_dns_servers: []  # Set to e.g. ["185.12.64.1", "185.12.64.2"] for Hetzner

# Devnet config
num_validators: 4
dkg_mode: trusted  # 'trusted' or 'interactive'
rust_log: info
chain_id: 1337

# Build
build_timeout: 3600  # 1 hour
build_poll: 30       # poll every 30s

# Health check
health_retries: 24
health_delay: 5

# Ports
ssh_port: 22
p2p_ports: "30400:30403"
secondary_p2p_port: 30500
rpc_ports: "8545:8548"
metrics_ports: "9000:9003"
prometheus_port: 9090
loki_port: 3100
grafana_port: 3000
grafana_admin_password: admin  # CHANGEME: override in host_vars or vault for production

# Trusted IPs allowed to access RPC, metrics, Prometheus, and Grafana.
# CHANGEME: restrict to your operator/monitoring IPs for production.
trusted_ips:
  - "0.0.0.0/0"  # WARNING: allows all traffic. Replace with specific IPs.
