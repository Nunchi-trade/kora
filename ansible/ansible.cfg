[defaults]
inventory = inventory/hosts.yml
roles_path = roles
# Disabled for first-time provisioning of fresh servers. Re-enable or use
# ANSIBLE_HOST_KEY_CHECKING=True once host keys are trusted.
host_key_checking = False
timeout = 30
stdout_callback = default
result_format = yaml

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
