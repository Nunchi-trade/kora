# Alertmanager configuration. The default receiver intentionally drops
# notifications so a test deployment does not emit alerts to a placeholder URL.
# Replace the receiver with Slack, PagerDuty, OpsGenie, or webhook configs when
# wiring a real alert destination.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: critical
      matchers:
        - severity="critical"
      repeat_interval: 1h

receivers:
  - name: default
  - name: critical

# Inhibit lower-severity alerts when a critical alert is already firing
# for the same instance. Reduces noise during outages.
inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'instance']
